<!DOCTYPE html>
<html>
<head>
    <title>Petrol Price Prediction</title>
    <script src="chart.js"></script>
    <link rel="icon" href="data:,">
</head>

<body style="font-family: Arial; text-align:center; padding:20px; background:black; color:white;">

    <canvas id="chart"></canvas>
    <h1>Petrol Price Prediction</h1>


<input type="number" id="years" placeholder="Enter years" />
<button onclick="getPrediction()">Predict Graph</button>

<h2>Get Price by Date</h2>

<input type="date" id="dateInput">
<button onclick="getPriceByDate()">Get Price</button>

<p id="result"></p>

<script>
async function getPrediction() {
    const years = document.getElementById("years").value;

    if (!years || years <= 0) {
        alert("Enter valid years");
        return;
    }

    const response = await fetch(`http://127.0.0.1:8000/predict_range?years=${years}`);
    const data = await response.json();

const yearlyData = {};

data.forEach(item => {
    const year = new Date(item.ds).getFullYear();

    if (!yearlyData[year]) {
        yearlyData[year] = [];
    }

    yearlyData[year].push(item.yhat);
});

// Calculate average per year
const labels = Object.keys(yearlyData);

const prices = labels.map(year => {
    const values = yearlyData[year];
    return values.reduce((a, b) => a + b, 0) / values.length;
});

    const ctx = document.getElementById('chart').getContext('2d');

  if (window.chart && typeof window.chart.destroy === "function") {
    window.chart.destroy();
}

window.chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Petrol Prediction',
            data: prices,
            borderWidth: 1,
            backgroundColor: 'rgba(0, 255, 0, 0.6)',
            borderColor: 'green'
        }]
    },
    options: {
        plugins: {
            legend: {
                labels: { color: 'white' }
            }
        },
        scales: {
            x: {
                ticks: { color: 'white' }
            },
            y: {
                ticks: { color: 'white' }
            }
        }
    }
});
}

async function getPriceByDate() {
    const date = document.getElementById("dateInput").value;

    if (!date) {
        alert("Select date");
        return;
    }

    const response = await fetch(`http://127.0.0.1:8000/predict_by_date?date=${date}`);
    const data = await response.json();

    document.getElementById("result").innerText =
        `₹${data.predicted_price} on ${data.date}`;
}
</script>

</body>
</html>
