<!DOCTYPE html>
<html>
<head>
    <title>Fuel Price Prediction</title>
    <script src="chart.js"></script>
</head>

<body style="font-family: Arial; text-align:center; padding:20px;">

<h1>Fuel Price Prediction</h1>

<input type="number" id="years" placeholder="Enter years" />
<button onclick="getPrediction()">Predict Graph</button>

<br><br>

<input type="date" id="dateInput" />
<button onclick="getPriceByDate()">Get Price</button>

<h3 id="result"></h3>

<br>
<canvas id="chart" width="600" height="300"></canvas>

<script>
let fullData = [];

async function getPrediction() {
    const years = document.getElementById("years").value;

    try {
        const response = await fetch(`http://127.0.0.1:8000/predict?years=${years}`);
        const data = await response.json();

        console.log(data);

        if (!Array.isArray(data)) {
            alert("Backend error");
            return;
        }

        fullData = data;

        const labels = data.map(item => new Date(item.ds).toLocaleDateString());
        const prices = data.map(item => item.yhat);

        const ctx = document.getElementById('chart').getContext('2d');

        if (window.myChart) {
            window.myChart.destroy();
        }

        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Predicted Fuel Price',
                    data: prices,
                    borderWidth: 2
                }]
            }
        });

    } catch (error) {
        console.error(error);
        alert("Error fetching data");
    }
}

function getPriceByDate() {
    const selectedDate = document.getElementById("dateInput").value;

    if (!selectedDate || fullData.length === 0) {
        document.getElementById("result").innerText = "Generate prediction first";
        return;
    }

    // Convert to first day of month
    const selected = new Date(selectedDate);
    selected.setDate(1);

    let closest = null;
    let minDiff = Infinity;

    fullData.forEach(item => {
        const itemDate = new Date(item.ds);
        const diff = Math.abs(itemDate - selected);

        if (diff < minDiff) {
            minDiff = diff;
            closest = item;
        }
    });

    if (closest) {
        document.getElementById("result").innerText =
            `Predicted Price ≈ ₹${closest.yhat.toFixed(2)} on ${new Date(closest.ds).toLocaleDateString()}`;
    } else {
        document.getElementById("result").innerText = "No data available";
    }
}
</script>

</body>
</html>
